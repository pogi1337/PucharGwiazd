<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Sport Manager - Puchar Gwiazd</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #090f1f; --sidebar-bg: #111827; --modal-bg: #1f2937;
            --accent: #38bdf8; --primary: #3b82f6; --success: #22c55e;
            --danger: #ef4444; --warning: #f59e0b; --text-main: #f3f4f6;
            --border: rgba(255,255,255,0.1);
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        * { box-sizing: border-box; }
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; z-index: 100; }
        .logo { font-size: 1.4rem; font-weight: 800; margin-bottom: 20px; color: var(--accent); display:flex; gap:10px; align-items:center; }
        .sport-selector { margin-bottom: 20px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        .sport-selector select { background: #374151; color: white; border: 1px solid var(--accent); padding: 8px; width: 100%; border-radius: 5px; cursor: pointer; }
        .menu-btn { background: none; border: none; color: #9ca3af; padding: 12px; text-align: left; cursor: pointer; font-size: 0.9rem; border-radius: 8px; transition: 0.2s; margin-bottom: 5px; font-weight: 600; display:flex; gap:10px; align-items:center; width: 100%; }
        .menu-btn.active { background: rgba(56, 189, 248, 0.1); color: var(--accent); }
        .main { flex-grow: 1; padding: 25px; overflow-y: auto; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .btn { padding: 10px 18px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; display:inline-flex; align-items:center; gap:5px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: #000; }
        .styled-table { width: 100%; border-collapse: collapse; color: #ddd; font-size: 0.85rem; }
        .styled-table th { padding: 10px; background: rgba(0,0,0,0.2); border-bottom: 2px solid var(--border); color: var(--accent); }
        .styled-table td { padding: 10px; border-bottom: 1px solid var(--border); text-align: center; }
        input, select, textarea { width: 100%; padding: 10px; background: #374151; border: 1px solid var(--border); color: white; border-radius: 6px; margin-top: 5px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: var(--modal-bg); width: 95%; max-width: 550px; border-radius: 12px; padding: 20px; max-height: 90vh; overflow-y: auto; }
        #login-screen { position: fixed; inset: 0; background: #050a18; z-index: 3000; display: flex; align-items: center; justify-content: center; }
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; flex-direction: row; overflow-x: auto; padding: 10px; position: sticky; top: 0; }
            .logo, .sport-selector { display: none; }
            .main { padding: 15px; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card" style="width: 350px; text-align: center;">
        <h2 style="color:var(--accent);">ADMIN LOGIN</h2>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Hasło">
        <button class="btn btn-primary" onclick="login()" style="width:100%; margin-top:15px;">ZALOGUJ</button>
    </div>
</div>

<div id="app-container" style="display:none; width:100%;">
    <nav class="sidebar">
        <div class="logo"><i class="fas fa-vial"></i> PANEL ADMINA</div>
        
        <div class="sport-selector">
            <label style="font-size: 0.7rem; color: var(--accent); font-weight: bold;">AKTYWNY SPORT:</label>
            <select id="activeSport" onchange="changeSport()">
                <option value="football">Piłka Nożna</option>
                <option value="volleyball">Siatkówka</option>
            </select>
        </div>

        <button class="menu-btn active" onclick="switchTab('matches', this)"><i class="fas fa-calendar-alt"></i> Mecze</button>
        <button class="menu-btn" onclick="switchTab('tables', this)"><i class="fas fa-table"></i> Tabele</button>
        <button class="menu-btn" onclick="switchTab('teams', this)"><i class="fas fa-users"></i> Drużyny</button>
        <button class="menu-btn" onclick="switchTab('news', this)"><i class="fas fa-newspaper"></i> Newsy</button>
        <button class="menu-btn" onclick="logout()" style="color:var(--danger); margin-top: auto;"><i class="fas fa-sign-out-alt"></i> Wyloguj</button>
    </nav>

    <main class="main">
        <div id="tab-matches" class="section active">
            <div class="header-row">
                <h2 id="matchTitle">Mecze: Piłka Nożna</h2>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-danger" onclick="deleteAllMatches()"><i class="fas fa-trash"></i> Wszystkie</button>
                    <button class="btn btn-success" onclick="openMatchModal()"><i class="fas fa-plus"></i> Dodaj</button>
                </div>
            </div>
            <div id="matchesContainer"></div>
        </div>

        <div id="tab-tables" class="section">
            <h2 id="tableTitle">Tabela: Piłka Nożna</h2>
            <div id="groupsContainer"></div>
        </div>

        <div id="tab-teams" class="section">
            <div class="header-row">
                <h2>Zarządzanie Drużynami</h2>
                <button class="btn btn-danger btn-sm" onclick="deleteAllTeams()">Usuń Wszystkie</button>
            </div>
            <div id="teamsListContainer" class="card"></div>
            
            <div class="card" style="border-top: 3px solid var(--success);">
                <h3>Kreator Konta Drużyny</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="text" id="accTeamName" placeholder="Nazwa Drużyny">
                    <select id="accSport">
                        <option value="football">Piłka Nożna</option>
                        <option value="volleyball">Siatkówka</option>
                    </select>
                    <input type="email" id="accEmail" placeholder="Email logowania">
                    <input type="password" id="accPass" placeholder="Hasło">
                </div>
                <button class="btn btn-success" style="width:100%; margin-top:15px;" onclick="createAccountAndTeam()">UTWÓRZ KONTO I DRUŻYNĘ</button>
            </div>
        </div>

        <div id="tab-news" class="section">
            <h2>Aktualności</h2>
            <div class="card">
                <input type="text" id="newsTitle" placeholder="Tytuł newsa">
                <textarea id="newsContent" rows="3" placeholder="Treść..."></textarea>
                <button class="btn btn-primary" style="margin-top:10px; width:100%;" onclick="addNews()">Opublikuj</button>
            </div>
            <div id="newsContainer"></div>
        </div>
    </main>
</div>

<div id="matchModal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modalHeading">Mecz</h3>
        <input type="hidden" id="editMatchId">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label>Gospodarz</label><select id="mHome"></select></div>
            <div><label>Gość</label><select id="mAway"></select></div>
            <div><label>Data</label><input type="date" id="mDate"></div>
            <div><label>Godzina</label><input type="time" id="mTime"></div>
            <div style="grid-column: span 2;"><label>Status</label>
                <select id="mStatus">
                    <option value="planned">Planowany</option>
                    <option value="live">NA ŻYWO</option>
                    <option value="finished">Zakończony</option>
                </select>
            </div>
            <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:8px;">
                <label id="scoreLabelH">Gole Gospodarz</label>
                <input type="number" id="mHomeScore" value="0">
            </div>
            <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:8px;">
                <label id="scoreLabelA">Gole Gość</label>
                <input type="number" id="mAwayScore" value="0">
            </div>
        </div>
        <div style="margin-top:20px; display:flex; justify-content:flex-end; gap:10px;">
            <button class="btn btn-secondary" onclick="closeMatchModal()">Anuluj</button>
            <button class="btn btn-primary" onclick="saveMatch()">ZAPISZ</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="admin.js"></script>
<script>
    function switchTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+id).classList.add('active');
        btn.classList.add('active');
    }
</script>
</body>
</html>
